# .github/workflows/ci.yml



name: CI — Observatory Test Suite


on:
  push:
    branches: [ main ]       
  pull_request:
    branches: [ main ]        


jobs:

  test:
  
    runs-on: ubuntu-latest

    
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
     
      - name: Checkout repository
        uses: actions/checkout@v4
        

     
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          # pytest-cov = measures how much of your code is covered by tests

      
      - name: Run tests with pytest
        run: |
          pytest tests/test_engines.py -v --tb=short
          # -v       = verbose: show each test name
          # --tb=short = short traceback on failure (not full wall of text)

      
      - name: Generate coverage report
        run: |
          pytest tests/test_engines.py \
            --cov=engines \
            --cov=core \
            --cov-report=term-missing \
            --cov-fail-under=60
          # --cov=engines        = measure coverage in engines/ folder
          # --cov=core           = measure coverage in core/ folder
          # --cov-report=term-missing = show which lines are NOT covered
          # --cov-fail-under=60  = fail CI if coverage drops below 60%

      
      - name: Verify app imports
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from engines.noise_auditor import NoiseAuditor
          from engines.bias_variance_engine import BiasVarianceEngine
          from engines.leakage_scanner import LeakageScanner
          from engines.curve_autopsy import CurveAutopsy
          from core.orchestrator import Orchestrator
          from core.trust_score import TrustScoreEngine
          from core.pdf_reporter import PDFReporter
          print('All imports successful')
          "